version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    working_dir: /app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gameofbraza
      POSTGRES_USER: gameofbraza
      POSTGRES_PASSWORD: gameofbraza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameofbraza"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16
    depends_on:
      - postgres
    profiles:
      - backup
    environment:
      PGPASSWORD: gameofbraza
    entrypoint: >
      sh -c "pg_dump -h postgres -U gameofbraza gameofbraza > /backup/dump_$$(date +%Y%m%d_%H%M%S).sql && echo 'Backup complete'"
    volumes:
      - backup_data:/backup

volumes:
  postgres_data:
  minio_data:
  backup_data:
